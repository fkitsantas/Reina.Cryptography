name: Build and Release

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: windows-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get the last commit message
        id: commit_message
        shell: pwsh
        run: |
          $commitMessage = git log -1 --pretty=%B

          "message<<EOF" >> $env:GITHUB_OUTPUT
          $commitMessage >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

          $commitMessage | Out-File -FilePath release-notes.md -Encoding utf8

      - name: Calculate version
        id: version
        shell: pwsh
        run: |
          if (!(Test-Path "Reina.Cryptography/Reina.Cryptography.csproj")) {
            Write-Error "Reina.Cryptography/Reina.Cryptography.csproj file not found"
            exit 1
          }

          [xml]$csproj = Get-Content "Reina.Cryptography/Reina.Cryptography.csproj"
          $currentVersion = $csproj.Project.PropertyGroup.VersionPrefix

          if ([string]::IsNullOrEmpty($currentVersion)) {
            Write-Error "VersionPrefix not found in Reina.Cryptography.csproj"
            exit 1
          }

          $versionParts = $currentVersion.Split('.')
          $major = [int]$versionParts[0]
          $minor = [int]$versionParts[1]
          $build = [int]$versionParts[2]

          $commitCount = git rev-list --count HEAD
          $build = ($build + $commitCount) % 10

          if ($build -eq 0 -and $commitCount -ne 0) {
            $minor += 1

            if ($minor -eq 10) {
              $major += 1
              $minor = 0
            }
          }

          $newVersion = "$major.$minor.$build"

          Write-Host "New version: $newVersion"
          "version=$newVersion" >> $env:GITHUB_OUTPUT

      - name: Update project version
        shell: pwsh
        run: |
          $csprojPath = "Reina.Cryptography/Reina.Cryptography.csproj"
          [xml]$csproj = Get-Content $csprojPath

          if ($csproj.Project.PropertyGroup.VersionPrefix) {
            $csproj.Project.PropertyGroup.VersionPrefix = "${{ steps.version.outputs.version }}"
          } else {
            Write-Error "<VersionPrefix> not found in $csprojPath"
            exit 1
          }

          $csproj.Save($csprojPath)

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add $csprojPath
          git commit -m "Update version to ${{ steps.version.outputs.version }}"
          git push

      - name: Build Project for .NET Framework 4.8.1 and .NET 10
        shell: pwsh
        run: |
          dotnet restore Reina.Cryptography/Reina.Cryptography.csproj
          dotnet build Reina.Cryptography/Reina.Cryptography.csproj --configuration Release

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null

          Write-Host "Searching for build outputs..."
          Get-ChildItem -Path "Reina.Cryptography/bin/Release" -Recurse -File

          $net481Dll = Get-ChildItem `
            -Path "Reina.Cryptography/bin/Release/net481" `
            -Filter "Reina.Cryptography.dll" `
            -File `
            -ErrorAction Stop |
            Select-Object -First 1

          $net10Dll = Get-ChildItem `
            -Path "Reina.Cryptography/bin/Release/net10.0" `
            -Filter "Reina.Cryptography.dll" `
            -File `
            -ErrorAction Stop |
            Select-Object -First 1

          if (-not $net481Dll) {
            Write-Error ".NET Framework 4.8.1 DLL was not found."
            exit 1
          }

          if (-not $net10Dll) {
            Write-Error ".NET 10 DLL was not found."
            exit 1
          }

          Copy-Item `
            -LiteralPath $net481Dll.FullName `
            -Destination "release-artifacts/Reina.Cryptography.net481.dll"

          Copy-Item `
            -LiteralPath $net10Dll.FullName `
            -Destination "release-artifacts/Reina.Cryptography.net10.0.dll"

          Write-Host "Prepared release artifacts:"
          Get-ChildItem -Path "release-artifacts" -File

      - name: Create GitHub release and upload assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" `
            "release-artifacts/Reina.Cryptography.net481.dll" `
            "release-artifacts/Reina.Cryptography.net10.0.dll" `
            --title "Reina.Cryptography v${{ steps.version.outputs.version }}" `
            --notes-file release-notes.md
